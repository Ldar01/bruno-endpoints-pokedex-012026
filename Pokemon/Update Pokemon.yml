info:
  name: Update Pokemon
  type: http
  seq: 2

http:
  method: PUT
  url: http://localhost:8080/pokedex/pokemon
  body:
    type: json
    data: |-
      {
        "id": 1,
        "name": "Pikachu",
        "type": "Electric",
        "level": 1,
        "weakness": "None"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
