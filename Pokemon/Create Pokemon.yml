info:
  name: Create Pokemon
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/pokedex/pokemon
  body:
    type: json
    data: |-
      {
        "full_name": "Evee",
        "type": "Normal",
        "level": 1,
        "weakness": "None"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
